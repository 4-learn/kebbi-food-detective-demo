<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>鯉魚過敏原小助手</title>
    <style>
      :root {
        --bg: #f7f4ea;
        --panel: #fffdf7;
        --ink: #1f2937;
        --brand: #0f766e;
        --brand-dark: #115e59;
        --line: #ddd6c8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at 20% 0%, #fff9e6, var(--bg) 45%);
      }

      .wrap {
        max-width: 760px;
        margin: 24px auto;
        padding: 0 16px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 16px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 24px;
      }

      .hint {
        font-size: 14px;
        margin: 0 0 12px;
      }

      input,
      button {
        border-radius: 10px;
        border: 1px solid var(--line);
        padding: 10px 12px;
        font-size: 16px;
      }

      input {
        width: 100%;
      }

      button {
        background: var(--brand);
        color: #fff;
        border-color: var(--brand);
        cursor: pointer;
      }

      button:hover {
        background: var(--brand-dark);
      }

      .row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
      }

      .stack {
        display: grid;
        gap: 10px;
      }

      .chatbox {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fff;
        min-height: 320px;
        max-height: 420px;
        overflow: auto;
        padding: 10px;
      }

      .msg {
        margin: 8px 0;
        padding: 8px 10px;
        border-radius: 10px;
        max-width: 85%;
        white-space: pre-wrap;
      }

      .me {
        margin-left: auto;
        background: #d1fae5;
      }

      .bot {
        margin-right: auto;
        background: #f3f4f6;
      }

      .error {
        color: #b91c1c;
        font-size: 14px;
        min-height: 20px;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section id="loginCard" class="card stack">
        <h1>鯉魚過敏原小助手</h1>
        <p class="hint">請先登入，登入後就可以開始聊天。</p>
        <input id="username" type="text" placeholder="帳號" autocomplete="username" />
        <input id="password" type="password" placeholder="密碼" autocomplete="current-password" />
        <button id="loginBtn" type="button">登入</button>
        <div id="loginError" class="error"></div>
      </section>

      <section id="chatCard" class="card stack hidden">
        <h1>聊天測試</h1>
        <div id="chatbox" class="chatbox"></div>
        <div class="row">
          <input id="messageInput" type="text" placeholder="輸入訊息..." />
          <button id="sendBtn" type="button">送出</button>
        </div>
        <div id="chatError" class="error"></div>
      </section>
    </main>

    <script>
      const loginCard = document.getElementById("loginCard");
      const chatCard = document.getElementById("chatCard");
      const usernameEl = document.getElementById("username");
      const passwordEl = document.getElementById("password");
      const loginBtn = document.getElementById("loginBtn");
      const loginError = document.getElementById("loginError");
      const chatbox = document.getElementById("chatbox");
      const messageInput = document.getElementById("messageInput");
      const sendBtn = document.getElementById("sendBtn");
      const chatError = document.getElementById("chatError");

      function appendMessage(role, text) {
        const line = document.createElement("div");
        line.className = `msg ${role === "me" ? "me" : "bot"}`;
        line.textContent = text;
        chatbox.appendChild(line);
        chatbox.scrollTop = chatbox.scrollHeight;
      }

      async function login() {
        const user = usernameEl.value.trim();
        const pass = passwordEl.value;

        loginBtn.disabled = true;
        loginError.textContent = "";

        try {
          const res = await fetch("/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: user, password: pass }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || "登入失敗");

          loginError.textContent = "";
          loginCard.classList.add("hidden");
          chatCard.classList.remove("hidden");
          appendMessage("bot", "嗨！我是過敏原小助手，今天想聊什麼食物？");
          messageInput.focus();
        } catch (err) {
          loginError.textContent = err.message || "帳號或密碼錯誤";
        } finally {
          loginBtn.disabled = false;
        }
      }

      async function sendMessage() {
        const message = messageInput.value.trim();
        if (!message) return;

        chatError.textContent = "";
        messageInput.value = "";
        appendMessage("me", message);
        sendBtn.disabled = true;

        try {
          const res = await fetch("/chat", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ message }),
          });

          const data = await res.json();
          if (!res.ok) {
            throw new Error(data.detail || "聊天失敗");
          }

          appendMessage("bot", data.reply || "(沒有回覆)");
        } catch (err) {
          chatError.textContent = `錯誤：${err.message}`;
        } finally {
          sendBtn.disabled = false;
          messageInput.focus();
        }
      }

      loginBtn.addEventListener("click", login);
      passwordEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter") login();
      });
      sendBtn.addEventListener("click", sendMessage);
      messageInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") sendMessage();
      });
    </script>
  </body>
</html>
