<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>鯉魚過敏原小助手</title>
    <style>
      :root {
        --bg: #f7f4ea;
        --panel: #fffdf7;
        --ink: #1f2937;
        --brand: #0f766e;
        --brand-dark: #115e59;
        --line: #ddd6c8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at 20% 0%, #fff9e6, var(--bg) 45%);
      }

      .wrap {
        max-width: 760px;
        margin: 24px auto;
        padding: 0 16px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 16px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 24px;
      }

      .hint {
        font-size: 14px;
        margin: 0 0 12px;
      }

      input,
      select,
      button {
        border-radius: 10px;
        border: 1px solid var(--line);
        padding: 10px 12px;
        font-size: 16px;
      }

      input {
        width: 100%;
      }

      select {
        width: 100%;
        background: #fff;
      }

      button {
        background: var(--brand);
        color: #fff;
        border-color: var(--brand);
        cursor: pointer;
      }

      button:hover {
        background: var(--brand-dark);
      }

      .row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
      }

      .stack {
        display: grid;
        gap: 10px;
      }

      .chatbox {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fff;
        min-height: 320px;
        max-height: 420px;
        overflow: auto;
        padding: 10px;
      }

      .msg {
        margin: 8px 0;
        padding: 8px 10px;
        border-radius: 10px;
        max-width: 85%;
        white-space: pre-wrap;
      }

      .me {
        margin-left: auto;
        background: #d1fae5;
      }

      .bot {
        margin-right: auto;
        background: #f3f4f6;
      }

      .bot-result {
        margin-right: auto;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
      }

      .result-title {
        margin: 0 0 8px;
        font-size: 15px;
        font-weight: 700;
      }

      .result-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px 10px;
        font-size: 14px;
      }

      .result-label {
        color: #475569;
      }

      .result-value {
        font-weight: 600;
      }

      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
      }

      .badge.ok {
        color: #166534;
        background: #dcfce7;
      }

      .badge.no {
        color: #991b1b;
        background: #fee2e2;
      }

      .reason {
        margin-top: 8px;
        font-size: 14px;
      }

      .actions {
        margin-top: 8px;
        padding-left: 18px;
        font-size: 14px;
      }

      .error {
        color: #b91c1c;
        font-size: 14px;
        min-height: 20px;
      }

      .hidden {
        display: none;
      }

      .subcard {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 12px;
        background: #fff;
      }

      .label {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
      }

      .muted {
        color: #6b7280;
        font-size: 13px;
      }

      .preview {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fafafa;
        object-fit: cover;
        aspect-ratio: 4 / 3;
      }

      .tool-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .chip {
        background: #ecfeff;
        color: #155e75;
        border: 1px solid #a5f3fc;
      }

      .chip.active {
        background: #cffafe;
        border-color: #06b6d4;
      }

      .samples {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 8px;
      }

      @media (max-width: 640px) {
        .row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section id="loginCard" class="card stack">
        <h1>鯉魚過敏原小助手</h1>
        <p class="hint">請先登入，登入後就可以開始聊天。</p>
        <input id="username" type="text" placeholder="帳號" autocomplete="username" />
        <input id="password" type="password" placeholder="密碼" autocomplete="current-password" />
        <button id="loginBtn" type="button">登入</button>
        <div id="loginError" class="error"></div>
      </section>

      <section id="chatCard" class="card stack hidden">
        <h1>聊天測試</h1>
        <section class="subcard stack">
          <label class="label" for="targetSelect">過敏原測試標的（可複選）</label>
          <select id="targetSelect" multiple size="6">
            <option value="花生" selected>花生</option>
            <option value="海鮮" selected>海鮮</option>
            <option value="人類">人類</option>
            <option value="甲殼類">甲殼類</option>
            <option value="牛奶">牛奶</option>
            <option value="蛋">蛋</option>
            <option value="堅果">堅果</option>
            <option value="芝麻">芝麻</option>
            <option value="大豆">大豆</option>
          </select>
          <p class="muted">預設已選：花生、海鮮</p>
        </section>

        <section class="subcard stack">
          <span class="label">照片來源</span>
          <video id="camera" class="preview hidden" autoplay playsinline muted></video>
          <img id="previewImage" class="preview" alt="尚未選擇圖片" />
          <canvas id="captureCanvas" class="hidden"></canvas>
          <div class="tool-row">
            <button id="openCameraBtn" type="button">開啟 Webcam</button>
            <button id="captureBtn" type="button">拍照</button>
            <button id="stopCameraBtn" type="button">關閉 Webcam</button>
            <label for="uploadInput" class="chip" style="padding: 10px 12px; border-radius: 10px; cursor: pointer"
              >上傳圖片</label
            >
            <input id="uploadInput" type="file" accept="image/*" class="hidden" />
          </div>
          <div id="imageMeta" class="muted">目前：尚未選擇圖片</div>
        </section>

        <section class="subcard stack">
          <span class="label">範例圖片</span>
          <div id="sampleButtons" class="samples"></div>
        </section>

        <div id="chatbox" class="chatbox"></div>
        <div class="row">
          <input id="messageInput" type="text" placeholder="輸入訊息..." />
          <button id="sendBtn" type="button">送出</button>
        </div>
        <div id="chatError" class="error"></div>
      </section>
    </main>

    <script>
      const loginCard = document.getElementById("loginCard");
      const chatCard = document.getElementById("chatCard");
      const usernameEl = document.getElementById("username");
      const passwordEl = document.getElementById("password");
      const loginBtn = document.getElementById("loginBtn");
      const loginError = document.getElementById("loginError");
      const chatbox = document.getElementById("chatbox");
      const messageInput = document.getElementById("messageInput");
      const sendBtn = document.getElementById("sendBtn");
      const chatError = document.getElementById("chatError");
      const targetSelect = document.getElementById("targetSelect");
      const camera = document.getElementById("camera");
      const previewImage = document.getElementById("previewImage");
      const captureCanvas = document.getElementById("captureCanvas");
      const openCameraBtn = document.getElementById("openCameraBtn");
      const captureBtn = document.getElementById("captureBtn");
      const stopCameraBtn = document.getElementById("stopCameraBtn");
      const uploadInput = document.getElementById("uploadInput");
      const imageMeta = document.getElementById("imageMeta");
      const sampleButtons = document.getElementById("sampleButtons");

      let cameraStream = null;
      let selectedImageDataUrl = "";
      let selectedImageSource = "尚未選擇";

      const sampleImages = [
        { name: "範例：蝦味先", color: "#ffe4e6", icon: "🦐" },
        { name: "範例：花生糖", color: "#fff7cc", icon: "🥜" },
        { name: "範例：綜合堅果", color: "#efe7ff", icon: "🥜" },
        { name: "範例：海鮮泡麵", color: "#e0f2fe", icon: "🍜" },
        { name: "範例：牛奶餅乾", color: "#fef3c7", icon: "🥛" },
        { name: "範例：蛋糕", color: "#fae8ff", icon: "🍰" },
        { name: "範例：芝麻包", color: "#f1f5f9", icon: "⚫" },
        { name: "範例：大豆飲", color: "#dcfce7", icon: "🫘" },
        { name: "範例：人類（測試）", color: "#fee2e2", icon: "🧑" },
      ];

      function createSampleImageDataUrl(title, bg, icon) {
        const canvas = document.createElement("canvas");
        canvas.width = 640;
        canvas.height = 480;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.textAlign = "center";
        ctx.fillStyle = "#334155";
        ctx.font = "80px sans-serif";
        ctx.fillText(icon, canvas.width / 2, 200);
        ctx.font = "bold 36px sans-serif";
        ctx.fillText(title, canvas.width / 2, 290);
        ctx.fillStyle = "#64748b";
        ctx.font = "22px sans-serif";
        ctx.fillText("Sample Image", canvas.width / 2, 340);

        return canvas.toDataURL("image/png");
      }

      function updatePreview(url, source) {
        selectedImageDataUrl = url || "";
        selectedImageSource = source || "尚未選擇";
        previewImage.src = selectedImageDataUrl || "";
        previewImage.alt = selectedImageDataUrl ? source : "尚未選擇圖片";
        imageMeta.textContent = `目前：${selectedImageSource}`;
      }

      function getSelectedTargets() {
        return Array.from(targetSelect.selectedOptions).map((opt) => opt.value);
      }

      async function startCamera() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          chatError.textContent = "你的瀏覽器不支援 webcam。";
          return;
        }
        try {
          cameraStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: "environment" } },
            audio: false,
          });
          camera.srcObject = cameraStream;
          camera.classList.remove("hidden");
          previewImage.classList.add("hidden");
          chatError.textContent = "";
        } catch (err) {
          chatError.textContent = `無法開啟鏡頭：${err.message}`;
        }
      }

      function stopCamera() {
        if (cameraStream) {
          cameraStream.getTracks().forEach((track) => track.stop());
          cameraStream = null;
        }
        camera.srcObject = null;
        camera.classList.add("hidden");
        previewImage.classList.remove("hidden");
      }

      function capturePhoto() {
        if (!cameraStream || !camera.videoWidth || !camera.videoHeight) {
          chatError.textContent = "鏡頭尚未準備好，請先開啟 webcam。";
          return;
        }
        captureCanvas.width = camera.videoWidth;
        captureCanvas.height = camera.videoHeight;
        const ctx = captureCanvas.getContext("2d");
        ctx.drawImage(camera, 0, 0);
        updatePreview(captureCanvas.toDataURL("image/jpeg", 0.92), "webcam 拍照");
        stopCamera();
      }

      function renderSampleButtons() {
        sampleButtons.innerHTML = "";
        sampleImages.forEach((sample) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "chip";
          btn.textContent = sample.name;
          btn.addEventListener("click", () => {
            const url = createSampleImageDataUrl(sample.name, sample.color, sample.icon);
            updatePreview(url, sample.name);
            Array.from(sampleButtons.children).forEach((el) => el.classList.remove("active"));
            btn.classList.add("active");
          });
          sampleButtons.appendChild(btn);
        });
      }

      function appendMessage(role, text) {
        const line = document.createElement("div");
        line.className = `msg ${role === "me" ? "me" : "bot"}`;
        line.textContent = text;
        chatbox.appendChild(line);
        chatbox.scrollTop = chatbox.scrollHeight;
      }

      function appendResultCard(data) {
        const line = document.createElement("div");
        line.className = "msg bot-result";

        const match = Boolean(data.target_match);
        const confidence = Number.isFinite(Number(data.confidence)) ? Math.round(Number(data.confidence) * 100) : 0;
        const matched = Array.isArray(data.matched_targets) ? data.matched_targets.join("、") : "";
        const unmatched = Array.isArray(data.unmatched_targets) ? data.unmatched_targets.join("、") : "";
        const nextActions = Array.isArray(data.next_actions) ? data.next_actions : [];

        line.innerHTML = `
          <div class="result-title">辨識結果</div>
          <div class="result-grid">
            <div class="result-label">主體</div>
            <div class="result-value">${data.detected_subject || "未知"}</div>
            <div class="result-label">目標比對</div>
            <div class="result-value"><span class="badge ${match ? "ok" : "no"}">${match ? "符合" : "不符合"}</span></div>
            <div class="result-label">信心</div>
            <div class="result-value">${confidence}%</div>
            <div class="result-label">風險等級</div>
            <div class="result-value">${data.risk_level || "中"}</div>
            <div class="result-label">命中目標</div>
            <div class="result-value">${matched || "無"}</div>
            <div class="result-label">未命中目標</div>
            <div class="result-value">${unmatched || "無"}</div>
          </div>
          <div class="reason"><strong>判斷依據：</strong>${data.reason || data.reply || "無"}</div>
          ${
            nextActions.length
              ? `<div><strong>建議下一步：</strong><ul class="actions">${nextActions.map((x) => `<li>${x}</li>`).join("")}</ul></div>`
              : ""
          }
        `;

        chatbox.appendChild(line);
        chatbox.scrollTop = chatbox.scrollHeight;
      }

      async function login() {
        const user = usernameEl.value.trim();
        const pass = passwordEl.value;

        loginBtn.disabled = true;
        loginError.textContent = "";

        try {
          const res = await fetch("/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: user, password: pass }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || "登入失敗");

          loginError.textContent = "";
          loginCard.classList.add("hidden");
          chatCard.classList.remove("hidden");
          appendMessage("bot", "嗨！我是過敏原小助手，今天想聊什麼食物？");
          messageInput.focus();
        } catch (err) {
          loginError.textContent = err.message || "帳號或密碼錯誤";
        } finally {
          loginBtn.disabled = false;
        }
      }

      async function sendMessage() {
        const message = messageInput.value.trim();
        const targets = getSelectedTargets();
        if (!message && !selectedImageDataUrl) return;

        chatError.textContent = "";
        messageInput.value = "";
        const visualNote = selectedImageDataUrl ? `\n圖片：${selectedImageSource}` : "";
        appendMessage("me", `${message || "請協助辨識這張圖片"}\n目標：${targets.join("、") || "未選擇"}${visualNote}`);
        sendBtn.disabled = true;

        try {
          const res = await fetch("/chat", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              message,
              user_message: message,
              targets,
              image_source: selectedImageSource,
              image_data_url: selectedImageDataUrl,
            }),
          });

          const raw = await res.text();
          let data;
          try {
            data = raw ? JSON.parse(raw) : {};
          } catch (e) {
            throw new Error(`伺服器回傳非 JSON（HTTP ${res.status}）`);
          }
          if (!res.ok) {
            throw new Error(data.detail || "聊天失敗");
          }

          if ("detected_subject" in data || "target_match" in data) {
            appendResultCard(data);
          } else {
            appendMessage("bot", data.reply || "(沒有回覆)");
          }
        } catch (err) {
          chatError.textContent = `錯誤：${err.message}`;
        } finally {
          sendBtn.disabled = false;
          messageInput.focus();
        }
      }

      renderSampleButtons();
      updatePreview("", "尚未選擇圖片");
      loginBtn.addEventListener("click", login);
      passwordEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter") login();
      });
      openCameraBtn.addEventListener("click", startCamera);
      stopCameraBtn.addEventListener("click", stopCamera);
      captureBtn.addEventListener("click", capturePhoto);
      uploadInput.addEventListener("change", () => {
        const file = uploadInput.files && uploadInput.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          updatePreview(String(reader.result || ""), `本機上傳：${file.name}`);
          Array.from(sampleButtons.children).forEach((el) => el.classList.remove("active"));
        };
        reader.readAsDataURL(file);
      });
      sendBtn.addEventListener("click", sendMessage);
      messageInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") sendMessage();
      });
      window.addEventListener("beforeunload", stopCamera);
    </script>
  </body>
</html>
